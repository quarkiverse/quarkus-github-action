name: '{project.name}'
description: '{project.description}'
inputs:
  github-token:
    description: 'GitHub token'
    required: true
  action:
    description: 'Name of the action (if named)'
    required: false

runs:
  using: "composite"
  steps:
    - name: Inject quarkus-github-action repository credentials
      shell: bash
      run: |
        if [ -f ~/.m2/settings.xml ]; then
          if ! grep -q '<id>quarkus-github-action</id>' ~/.m2/settings.xml; then
            yq -p xml -o xml -i '.settings.servers.server |= (. | [.] + [{"id": "quarkus-github-action", "username": "$\{env.GITHUB_ACTOR}", "password": "$\{env.GITHUB_TOKEN}"}])' ~/.m2/settings.xml
          fi
        else
          mkdir -p ~/.m2/
          yq -p xml -o xml -n '.settings.servers.server = {"id": "quarkus-github-action", "username": "$\{env.GITHUB_ACTOR}", "password": "$\{env.GITHUB_TOKEN}"}' > ~/.m2/settings.xml
        fi
    - name: Set up JBang
      uses: jbangdev/setup-jbang@main
    - name: Run the action
      id: action
      run: jbang --java {java.version} --fresh --repos 'quarkus-github-action=https://maven.pkg.github.com/{github-repository}/' --repos 'mavencentral' {project.group-id}:{project.artifact-id}:{project.version}
      shell: bash
      env:
        JSON_INPUTS: ${{ toJSON(inputs) }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
